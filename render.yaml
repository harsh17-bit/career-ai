services:
  - type: web
    name: career-ai
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: GOOGLE_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
